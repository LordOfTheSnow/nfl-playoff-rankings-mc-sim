<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Monte Carlo Playoff Ranking Simulator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background-color:#1b3a6b">
        <div class="container-xl">
            <div class="d-flex flex-column">
                <a class="navbar-brand d-flex align-items-center gap-2 mb-0" href="#standings">
                    <img src="img/logos/nfl.png" alt="NFL" width="32" height="32">
                    <span>NFL Monte Carlo Playoff Ranking Simulator</span>
                    <span id="app-version" class="ms-2" style="font-size:0.7rem;color:rgba(255,255,255,0.6)"></span>
                </a>
                <span style="font-size:0.65rem;color:rgba(255,255,255,0.45);padding-left:2.75rem">This is an independent project not affiliated with the NFL or any official NFL service. All data is sourced from publicly available APIs.</span>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="#standings">Standings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#schedule-grid">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="#statistics">Statistics</a></li>
                    <li class="nav-item"><a class="nav-link" href="#results">Results</a></li>
                    <li class="nav-item ms-lg-3 d-flex align-items-center">
                        <label for="season-selector" class="text-light me-2 small d-none d-lg-inline">Season:</label>
                        <select id="season-selector" class="form-select form-select-sm" style="width:auto;background-color:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.3)" aria-label="Select season year">
                        </select>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="notification" class="container-xl mt-2 d-none" role="alert" aria-live="polite"></div>
    <div id="loading" class="d-none" aria-label="Loading">Loading…</div>

    <main id="content" class="container-xl py-4"></main>

    <footer style="text-align:center;padding:1.5rem;margin-top:2rem">
        <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;" style="color:var(--color-primary-light);text-decoration:none;font-size:0.9rem">↑ Back to top</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/standings.js"></script>
    <script src="js/schedule-grid.js"></script>
    <script src="js/schedule.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
