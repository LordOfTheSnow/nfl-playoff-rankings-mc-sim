<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Monte Carlo Playoff Ranking Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <div class="site-title">
                <img src="img/logos/nfl.png" alt="NFL" width="32" height="32">
                <span>NFL Monte Carlo Playoff Ranking Simulator</span>
            </div>
            <nav class="main-nav">
                <a href="#standings" class="nav-link active">Standings</a>
                <a href="#statistics" class="nav-link">Statistics</a>
                <a href="#results" class="nav-link">Results</a>
            </nav>
        </div>
        <div class="header-disclaimer">
            This is an independent project not affiliated with the NFL or any official NFL service. All data is sourced from publicly available APIs.
        </div>
    </header>

    <div id="notification" class="hidden" role="alert" aria-live="polite"></div>
    <div id="loading" class="hidden" aria-label="Loading">Loading…</div>

    <main id="content"></main>

    <footer style="text-align:center;padding:1.5rem;margin-top:2rem">
        <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;" style="color:var(--color-primary-light);text-decoration:none;font-size:0.9rem">↑ Back to top</a>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/standings.js"></script>
    <script src="js/schedule.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
